<!DOCTYPE html>
<html lang="en">
<head>
    <!-- CORE PROXY SCRIPTS -->
    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
    <script src="register-sw.js" defer></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Flash Browser</title>

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-bar: #16161a;
            --bg-nav: #24242b;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --text-dark: #64748b;
            --border-light: rgba(255,255,255,0.05);
            --yellow: #facc15;
            --yellow-hover: #eab308;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html,body { height: 100%; width: 100%; font-family: system-ui,-apple-system,"Segoe UI",Roboto; background: var(--bg-main); color: var(--text-main); display:flex; flex-direction:column; }

        /* Tab bar */
        .tab-bar { display:flex; align-items:center; background:var(--bg-bar); padding:8px 8px 0; gap:4px; border-bottom:1px solid var(--border-light); }
        .tab-container { display:flex; flex:1; gap:4px; overflow-x:auto; }
        .tab-container::-webkit-scrollbar{ display:none; }
        .add-tab-btn { padding:8px; border-radius:50%; background:transparent; border:0; color:var(--text-dark); cursor:pointer; }

        /* Tab */
        .tab { display:flex; align-items:center; min-width:140px; max-width:220px; height:40px; padding:0 12px; border-radius:12px 12px 0 0; color:var(--text-muted); font-weight:600; cursor:pointer; position:relative; }
        .tab:hover { background: rgba(255,255,255,0.03); }
        .tab.active { background:var(--bg-nav); color:#fff; }
        .tab.active::after { content:''; position:absolute; left:0; right:0; bottom:0; height:2px; background:var(--yellow-hover); box-shadow:0 -2px 10px rgba(234,179,8,0.4); }
        .tab-icon-wrapper { width:18px; height:18px; margin-right:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .tab-favicon { width:16px; height:16px; border-radius:2px; object-fit:cover; }
        .tab-title { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
        .tab-close { margin-left:8px; padding:4px; border-radius:6px; opacity:0; transition:opacity .12s; display:flex; align-items:center; justify-content:center; }
        .tab:hover .tab-close { opacity:1; }

        /* Nav */
        .nav-bar { display:flex; align-items:center; gap:12px; background:var(--bg-nav); padding:10px 16px; box-shadow:0 25px 50px -12px rgba(0,0,0,0.5); z-index:20; }
        .nav-btn { padding:8px; border-radius:8px; background:transparent; border:0; cursor:pointer; color:var(--text-muted); display:flex; align-items:center; justify-content:center; }
        .url-container { flex:1; position:relative; display:flex; align-items:center; }
        .url-icon { position:absolute; left:16px; color:var(--text-dark); width:16px; height:16px; }
        .url-input { width:100%; padding:10px 140px 10px 44px; border-radius:12px; background:var(--bg-bar); border:1px solid var(--border-light); color: #fff; font-weight:500; }

        .proxy-controls { position:absolute; right:8px; display:flex; align-items:center; gap:8px; }
        .proxy-badge { font-size:9px; padding:3px 8px; border-radius:6px; font-family:monospace; font-weight:800; text-transform:uppercase; letter-spacing:.08em; }

        /* Main / home */
        main { flex:1; position:relative; overflow:hidden; display:flex; flex-direction:column; }
        #homeScreen { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10; }
        .search-wrapper { width:100%; max-width:42rem; padding:0 24px; position:relative; }
        .main-search { width:100%; padding:20px 24px 20px 64px; border-radius:16px; background:var(--bg-bar); border:1px solid rgba(255,255,255,0.06); color:#fff; font-size:20px; }
        .frames-container { width:100%; height:100%; position:relative; }
        iframe { width:100%; height:100%; border:0; display:none; background: white; }

        .quick-links { display:flex; gap:32px; margin-top:64px; }
        .ql-icon { width:64px; height:64px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:900; background:var(--bg-bar); border:1px solid var(--border-light); }

        /* minimal error overlay */
        #errorOverlay { position:absolute; inset:0; display:none; z-index:60; background: rgba(10,10,12,0.92); color:var(--text-main); align-items:center; justify-content:center; flex-direction:column; padding:20px; text-align:center; }
        .error-btn { margin-top:12px; padding:10px 18px; background:var(--yellow-hover); border-radius:10px; border:0; cursor:pointer; }

        footer { display:none; }
    </style>
</head>
<body>
    <div class="tab-bar">
        <div id="tabContainer" class="tab-container"></div>
        <button onclick="addTab()" class="add-tab-btn" title="New tab"><i data-lucide="plus"></i></button>
    </div>

    <div class="nav-bar">
        <div style="display:flex; gap:8px; align-items:center;">
            <button class="nav-btn" onclick="navBack()" title="Back"><i data-lucide="arrow-left"></i></button>
            <button class="nav-btn" onclick="navForward()" title="Forward"><i data-lucide="arrow-right"></i></button>
            <button class="nav-btn" onclick="reloadTab()" title="Reload"><i data-lucide="rotate-cw"></i></button>
            <button class="nav-btn" onclick="goHome()" title="Home"><i data-lucide="home"></i></button>
        </div>

        <div class="url-container">
            <i data-lucide="shield-check" class="url-icon"></i>
            <input id="urlInput" class="url-input" type="text" placeholder="Search or enter address..." />
            <div class="proxy-controls">
                <span id="proxyLabel" class="proxy-badge" style="background:rgba(74,222,128,0.08); color:#4ade80">SCRAMJET</span>
            </div>
        </div>
    </div>

    <main>
        <div id="homeScreen">
            <div style="text-align:center; margin-bottom:24px;"><h1 style="font-size:3.6rem; margin:0;">FLASH <span style="color:var(--yellow)">⚡</span></h1></div>
            <div class="search-wrapper">
                <i data-lucide="search" style="position:absolute; left:44px; top:50%; transform:translateY(-50%); color:var(--text-muted)"></i>
                <input id="mainSearch" class="main-search" placeholder="What are we doing today?" />
            </div>

            <div class="quick-links">
                <div onclick="navigate('google.com')" style="cursor:pointer; text-align:center;">
                    <div class="ql-icon" style="color:#60a5fa">G</div>
                    <div style="font-size:11px;color:#94a3b8;margin-top:6px">Google</div>
                </div>
                <div onclick="navigate('youtube.com')" style="cursor:pointer; text-align:center;">
                    <div class="ql-icon" style="color:#ef4444">Y</div>
                    <div style="font-size:11px;color:#94a3b8;margin-top:6px">YouTube</div>
                </div>
                <div onclick="navigate('discord.com')" style="cursor:pointer; text-align:center;">
                    <div class="ql-icon" style="color:#818cf8">D</div>
                    <div style="font-size:11px;color:#94a3b8;margin-top:6px">Discord</div>
                </div>
            </div>
        </div>

        <div id="errorOverlay">
            <div><strong>Proxy Engine Error</strong></div>
            <div id="errorMsg" style="opacity:.9; color:var(--text-muted); max-width:480px; margin-top:12px;"></div>
            <button class="error-btn" onclick="hideError()">Close</button>
        </div>

        <div id="framesContainer" class="frames-container"></div>
    </main>

<script>
/*
  Fixed index.html:
  - Waits for scramjet controller init and registers a fallback path (direct /scramjet/<encoded>).
  - Avoids calling scramjetFrame before ready.
  - Adds robust tab/iframe lifecycle handling + onload/onerror + error overlay.
  - Safe fallback if controller isn't available (useful on deploy / race conditions).
*/

let scramjet = null;
let scramjetReady = false;
let tabs = [];
let activeTabId = null;

const tabContainer = document.getElementById('tabContainer');
const framesContainer = document.getElementById('framesContainer');
const urlInput = document.getElementById('urlInput');
const mainSearch = document.getElementById('mainSearch');
const homeScreen = document.getElementById('homeScreen');
const errorOverlay = document.getElementById('errorOverlay');
const errorMsg = document.getElementById('errorMsg');

// initialize icons
lucide.createIcons();

// Try to init scramjet controller. If it fails, we still keep UI and fallback to /scramjet/ path.
window.addEventListener('load', async () => {
    // ensure service worker activated first — improves routing reliability
    if ('serviceWorker' in navigator) {
        try { await navigator.serviceWorker.ready; } catch (e) { /* ignore */ }
    }

    try {
        const ctrl = await $scramjetLoadController();
        const { ScramjetController } = ctrl;
        scramjet = new ScramjetController({
            files: {
                wasm: "/scram/scramjet.wasm.wasm",
                all: "/scram/scramjet.all.js",
                sync: "/scram/scramjet.sync.js"
            }
        });
        await scramjet.init();
        scramjetReady = true;
        console.log("Scramjet controller ready");
    } catch (e) {
        console.warn("Scramjet controller not available — falling back to direct /scramjet/ iframe routing", e);
        scramjet = null;
        scramjetReady = false;
    } finally {
        // ensure at least one tab exists
        addTab();
        // small focus nicety
        setTimeout(() => mainSearch.focus(), 120);
    }
});

/* ---------- Tabs & frames ---------- */

function addTab() {
    const id = Date.now();
    const tab = { id, title: 'New Tab', url: '', favicon: null };
    tabs.push(tab);

    const frame = document.createElement('iframe');
    frame.id = `frame-${id}`;
    frame.style.display = 'none';
    // onload: hide error overlay and ensure frame visible (some sites may block cross-origin access)
    frame.onload = () => {
        hideError();
        // When a page loads inside the iframe, show it (unless we're on home)
        const t = tabs.find(x => x.id === id);
        if (t && t.url) {
            frame.style.display = 'block';
        }
    };
    frame.onerror = () => {
        showError("Failed to route / load content for this tab. If this persists, try re-opening the tab or switch engine on the server.");
    };

    framesContainer.appendChild(frame);
    // make new tab active
    switchTab(id);
}

function closeTab(e, id) {
    e.stopPropagation();
    if (tabs.length === 1) return; // keep one tab
    const idx = tabs.findIndex(t => t.id === id);
    if (idx === -1) return;
    tabs.splice(idx, 1);
    const f = document.getElementById(`frame-${id}`);
    if (f) f.remove();

    if (activeTabId === id) {
        const next = tabs[idx] || tabs[tabs.length - 1];
        if (next) switchTab(next.id);
        else addTab();
    } else {
        renderTabs();
    }
}

function switchTab(id) {
    activeTabId = id;
    document.querySelectorAll('iframe').forEach(f => f.style.display = 'none');
    const activeFrame = document.getElementById(`frame-${id}`);
    const tab = tabs.find(t => t.id === id);

    if (tab && tab.url) {
        activeFrame.style.display = 'block';
        homeScreen.style.display = 'none';
        urlInput.value = tab.url;
    } else {
        activeFrame.style.display = 'none';
        homeScreen.style.display = 'flex';
        urlInput.value = '';
    }
    renderTabs();
}

function renderTabs() {
    tabContainer.innerHTML = '';
    tabs.forEach(tab => {
        const isActive = tab.id === activeTabId;
        const div = document.createElement('div');
        div.className = `tab ${isActive ? 'active' : ''}`;
        div.onclick = () => switchTab(tab.id);

        let iconHTML = '';
        if (tab.favicon) {
            // escape src + alt not needed for favicon tiny helper
            iconHTML = `<img src="${escapeHtml(tab.favicon)}" class="tab-favicon" onerror="this.parentElement.innerHTML='<i data-lucide=&quot;globe&quot; class=&quot;tab-icon inactive&quot;></i>'">`;
        } else {
            iconHTML = `<i data-lucide="${isActive ? 'zap' : 'globe'}" class="tab-icon ${isActive ? 'active' : 'inactive'}"></i>`;
        }

        div.innerHTML = `
            <div class="tab-icon-wrapper">${iconHTML}</div>
            <span class="tab-title">${escapeHtml(tab.title)}</span>
            <span class="tab-close" onclick="closeTab(event, ${tab.id})" title="Close tab"><i data-lucide="x"></i></span>
        `;
        tabContainer.appendChild(div);
    });
    lucide.createIcons();
}

/* ---------- Navigation / proxy routing ---------- */

function navigate(rawVal) {
    // If invoked from onclick('google.com') it receives a string; if invoked via Enter, we receive the input value
    let raw = typeof rawVal === 'string' ? rawVal.trim() : (urlInput.value || mainSearch.value || '').trim();
    if (!raw) return;

    // transform to URL or search
    let url = raw;
    if (!url.includes('.') || url.includes(' ')) {
        url = `https://www.google.com/search?q=${encodeURIComponent(raw)}`;
    } else if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
    }

    // ensure there's an active tab (should exist)
    if (!activeTabId) addTab();
    const frame = document.getElementById(`frame-${activeTabId}`);
    if (!frame) { showError('Internal error: tab frame missing'); return; }

    // If scramjet controller is ready, use its frame API (preferred)
    if (scramjetReady && scramjet) {
        try {
            if (!frame.scramjetFrame) {
                // create a scram frame and bind the DOM iframe
                const f = scramjet.createFrame();
                // scramjet's frame object has a .frame property that is the DOM iframe — ensure binding
                f.frame = frame;
                frame.scramjetFrame = f;
            }
            // Go via controller API — it handles everything for us
            frame.scramjetFrame.go(url);
        } catch (e) {
            console.error("scramjet frame go failed, falling back to direct path:", e);
            // fallback to direct path below
            frame.src = buildDirectProxyUrl(url);
        }
    } else {
        // controller isn't ready — fallback to direct /scramjet/ path
        frame.src = buildDirectProxyUrl(url);
    }

    // update tab metadata (title, favicon fallback)
    const tab = tabs.find(t => t.id === activeTabId);
    if (tab) {
        tab.url = url;
        tab.title = deriveTitleFromUrl(url);
        try { tab.favicon = `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64`; } catch(e) { tab.favicon = null; }
    }

    // show frame / hide home
    homeScreen.style.display = 'none';
    frame.style.display = 'block';
    urlInput.value = url;
    mainSearch.value = url;
    renderTabs();
}

// Construct /scramjet/ fallback URL. We encode so path is valid.
function buildDirectProxyUrl(url) {
    // Many scramjet deployments expect the target after the path (server side will decode)
    // encodeURIComponent ensures the path is valid as a URL.
    return '/scramjet/' + encodeURIComponent(url);
}

function deriveTitleFromUrl(url) {
    try {
        const u = new URL(url);
        return u.hostname;
    } catch (e) {
        return url.length > 20 ? url.slice(0, 17) + '...' : url;
    }
}

function goHome() {
    const tab = tabs.find(t => t.id === activeTabId);
    if (!tab) return;
    tab.url = '';
    tab.title = 'New Tab';
    tab.favicon = null;
    switchTab(activeTabId);
}

/* ---------- small helpers & UI ---------- */

function showError(msg) {
    if (errorOverlay && errorMsg) {
        errorMsg.textContent = msg || 'Unknown proxy error';
        errorOverlay.style.display = 'flex';
    } else {
        alert(msg || 'Error');
    }
}

function hideError() {
    if (errorOverlay) errorOverlay.style.display = 'none';
}

function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, function (m) {
        return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[m];
    });
}

/* ---------- events ---------- */

// Enter on inputs triggers navigate
[urlInput, mainSearch].forEach(el => {
    el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            navigate(e.target.value || e.target.value === '' ? e.target.value : undefined);
        }
    });
});

// Expose controls to global (buttons in markup call these)
window.addTab = addTab;
window.navigate = navigate;
window.closeTab = closeTab;
window.switchTab = switchTab;
window.goHome = goHome;
window.navBack = function() { try { const f = document.getElementById(`frame-${activeTabId}`); if (f && f.contentWindow) f.contentWindow.history.back(); } catch(e){} };
window.navForward = function() { try { const f = document.getElementById(`frame-${activeTabId}`); if (f && f.contentWindow) f.contentWindow.history.forward(); } catch(e){} };
window.reloadTab = function() { try { const f = document.getElementById(`frame-${activeTabId}`); if (f) { const old = f.src; f.src = ''; setTimeout(() => f.src = old, 10); } } catch(e){} };

// initial render icons (tabs will be created after scramjet init)
lucide.createIcons();
</script>
</body>
</html>
