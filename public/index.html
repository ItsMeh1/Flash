<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flash Browser</title>

    <!-- Scramjet assets (kept, but we don't rely on controller API here) -->
    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
    <script src="register-sw.js" defer></script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* --- theme & layout (your styles, unchanged) --- */
        :root {
            --bg-main: #0a0a0c;
            --bg-bar: #16161a;
            --bg-nav: #24242b;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --text-dark: #64748b;
            --border-light: rgba(255, 255, 255, 0.05);
            --yellow: #facc15;
            --yellow-hover: #eab308;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html,body { height:100vh; background:var(--bg-main); color:var(--text-main); font-family:system-ui,-apple-system,Segoe UI,Roboto; display:flex; flex-direction:column; }

        /* (styles copied from your file — tabs/nav/home/frames) */
        .tab-bar{display:flex;align-items:center;background:var(--bg-bar);padding:8px 8px 0;gap:4px;border-bottom:1px solid var(--border-light);}
        .tab-container{display:flex;flex:1;overflow-x:auto;gap:4px;} .tab-container::-webkit-scrollbar{display:none}
        .add-tab-btn{padding:8px;border-radius:50%;background:transparent;border:0;cursor:pointer}
        .tab{display:flex;align-items:center;min-width:140px;height:40px;padding:0 12px;border-radius:12px 12px 0 0;color:var(--text-muted);font-weight:600;cursor:pointer}
        .tab.active{background:var(--bg-nav);color:#fff;position:relative}
        .tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--yellow-hover)}
        .nav-bar{display:flex;align-items:center;gap:12px;background:var(--bg-nav);padding:10px 16px;box-shadow:0 25px 50px -12px rgba(0,0,0,.5)}
        .nav-btn{padding:8px;border-radius:8px;background:transparent;border:0;cursor:pointer;color:var(--text-muted)}
        .url-container{flex:1;position:relative;display:flex;align-items:center}
        .url-icon{position:absolute;left:16px;color:var(--text-dark)}
        .url-input{width:100%;background:var(--bg-bar);border-radius:12px;padding:10px 144px 10px 44px;border:1px solid var(--border-light);color:#fff}
        .proxy-controls{position:absolute;right:8px;display:flex;align-items:center;gap:8px}
        .proxy-badge{font-size:9px;padding:3px 8px;border-radius:6px;font-family:monospace}
        main{flex:1;position:relative;overflow:hidden}
        #homeScreen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
        .search-wrapper{width:100%;max-width:672px;padding:0 24px;position:relative}
        .main-search{width:100%;padding:20px 24px 20px 64px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);background:var(--bg-bar);color:#fff;font-size:20px}
        .frames-container{width:100%;height:100%;position:relative}
        iframe{width:100%;height:100%;border:0;display:none;background:var(--bg-main)}
        #errorOverlay{position:absolute;inset:0;display:none;z-index:60;background:rgba(10,10,12,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-main)}
        .error-btn{padding:12px 20px;border-radius:12px;background:var(--yellow-hover);border:0;cursor:pointer}
        footer{display:none}
    </style>
</head>
<body>
    <!-- Tab bar -->
    <div class="tab-bar">
        <div id="tabContainer" class="tab-container"></div>
        <button class="add-tab-btn" onclick="addTab()" title="New tab"><i data-lucide="plus"></i></button>
    </div>

    <!-- Nav bar -->
    <div class="nav-bar">
        <div style="display:flex;gap:8px;align-items:center">
            <button class="nav-btn" onclick="navBack()" title="Back"><i data-lucide="arrow-left"></i></button>
            <button class="nav-btn" onclick="navForward()" title="Forward"><i data-lucide="arrow-right"></i></button>
            <button class="nav-btn" onclick="reloadTab()" title="Reload"><i data-lucide="rotate-cw"></i></button>
            <a class="nav-btn" href="index.html" title="Home"><i data-lucide="home"></i></a>
        </div>

        <div class="url-container">
            <i data-lucide="shield-check" class="url-icon"></i>
            <input id="urlInput" class="url-input" type="text" placeholder="Search with Flash or enter address..." />
            <div class="proxy-controls">
                <span id="proxyLabel" class="proxy-badge" style="background:rgba(74,222,128,0.1);color:#4ade80">SCRAMJET</span>
            </div>
        </div>
    </div>

    <main>
        <div id="homeScreen">
            <div style="text-align:center;margin-bottom:24px">
                <h1 style="font-size:4rem;margin:0">FLASH <span style="color:var(--yellow)">⚡</span></h1>
            </div>

            <div class="search-wrapper">
                <i data-lucide="search" style="position:absolute;left:44px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
                <input id="mainSearch" class="main-search" placeholder="What are we doing today?" />
            </div>

            <div style="margin-top:48px;display:flex;gap:24px">
                <div onclick="navigate('google.com')" style="cursor:pointer"><div style="width:64px;height:64px;border-radius:12px;background:var(--bg-bar);display:flex;align-items:center;justify-content:center">G</div><div style="text-align:center;color:#475569;font-size:12px">Google</div></div>
                <div onclick="navigate('youtube.com')" style="cursor:pointer"><div style="width:64px;height:64px;border-radius:12px;background:var(--bg-bar);display:flex;align-items:center;justify-content:center">Y</div><div style="text-align:center;color:#475569;font-size:12px">YouTube</div></div>
                <div onclick="navigate('discord.com/app')" style="cursor:pointer"><div style="width:64px;height:64px;border-radius:12px;background:var(--bg-bar);display:flex;align-items:center;justify-content:center">D</div><div style="text-align:center;color:#475569;font-size:12px">Discord</div></div>
            </div>
        </div>

        <div id="errorOverlay">
            <div style="margin-bottom:16px"><strong>Proxy Engine Error</strong></div>
            <div style="max-width:420px;color:var(--text-muted);text-align:center;margin-bottom:18px">
                The proxy failed to route the request. Try again or switch engine on the server.
            </div>
            <button class="error-btn" onclick="hideError()">Close</button>
        </div>

        <div id="framesContainer" class="frames-container"></div>
    </main>

    <script>
    // --- core state ---
    let tabs = [];
    let activeTabId = null;

    const tabContainer = document.getElementById('tabContainer');
    const framesContainer = document.getElementById('framesContainer');
    const urlInput = document.getElementById('urlInput');
    const mainSearch = document.getElementById('mainSearch');
    const homeScreen = document.getElementById('homeScreen');
    const errorOverlay = document.getElementById('errorOverlay');

    // icons
    lucide.createIcons();

    // Add initial tab on load
    window.addEventListener('load', () => {
        addTab();
        // focus the main search for quick typing
        setTimeout(()=> mainSearch.focus(), 100);
    });

    // --- tabs ---
    function addTab() {
        const id = Date.now();
        const tab = { id, title: 'New Tab', url: '' };
        tabs.push(tab);

        const frame = document.createElement('iframe');
        frame.id = `frame-${id}`;
        frame.style.display = 'none';

        // onload: hide error overlay and try to set title (can't access cross-origin title)
        frame.onload = () => {
            hideError();
            // show visible frame
            frame.style.display = 'block';
        };
        frame.onerror = () => {
            showError();
        };

        framesContainer.appendChild(frame);
        switchTab(id);
        renderTabs();
    }

    function renderTabs() {
        tabContainer.innerHTML = '';
        for (const tab of tabs) {
            const isActive = tab.id === activeTabId;
            const div = document.createElement('div');
            div.className = `tab ${isActive ? 'active' : ''}`;
            div.onclick = () => switchTab(tab.id);
            div.innerHTML = `
                <i data-lucide="${isActive ? 'zap' : 'globe'}" class="tab-icon"></i>
                <span class="tab-title">${escapeHtml(tab.title)}</span>
                <span class="tab-close" onclick="closeTab(event, ${tab.id})" title="Close tab">
                    <i data-lucide="x"></i>
                </span>
            `;
            tabContainer.appendChild(div);
        }
        lucide.createIcons();
    }

    function switchTab(id) {
        activeTabId = id;
        // hide all frames
        document.querySelectorAll('iframe').forEach(f => f.style.display = 'none');
        const activeFrame = document.getElementById(`frame-${id}`);
        const tab = tabs.find(t => t.id === id);

        if (tab && tab.url) {
            activeFrame.style.display = 'block';
            homeScreen.style.display = 'none';
            urlInput.value = tab.url;
        } else {
            homeScreen.style.display = 'flex';
            urlInput.value = '';
        }
        renderTabs();
    }

    function closeTab(e, id) {
        e.stopPropagation();
        if (tabs.length === 1) return; // keep one tab
        const idx = tabs.findIndex(t => t.id === id);
        tabs.splice(idx, 1);
        const f = document.getElementById(`frame-${id}`);
        if (f) f.remove();
        if (activeTabId === id) {
            const next = tabs[idx - 1] || tabs[0];
            switchTab(next.id);
        } else renderTabs();
    }

    // --- navigation using /scramjet/<encoded-url> route ---
    function navigate(query) {
        if (!query && !urlInput.value) return;
        // Use the non-empty input (mainSearch or urlInput)
        const raw = (query || urlInput.value || mainSearch.value).trim();
        if (!raw) return;

        let url = raw;
        // If likely a search (no dot or contains space) -> google search
        if (!url.includes('.') || url.includes(' ')) {
            url = `https://www.google.com/search?q=${encodeURIComponent(raw)}`;
        } else if (!url.startsWith('http://') && !url.startsWith('https://')) {
            url = 'https://' + url;
        }

        // ensure an active tab exists
        if (!activeTabId) addTab();

        const frame = document.getElementById(`frame-${activeTabId}`);
        if (!frame) return showError();

        // Build proxy route using percent-encoding
        const proxyUrl = '/scramjet/' + encodeURIComponent(url);

        // set src — this should be served by your server / scramjet app
        frame.src = proxyUrl;

        // update tab meta
        const tab = tabs.find(t => t.id === activeTabId);
        tab.title = (raw.length > 15 ? raw.slice(0,12) + '...' : raw);
        tab.url = raw;
        urlInput.value = raw;
        mainSearch.value = raw;

        // show the frame area and hide home screen
        homeScreen.style.display = 'none';
        frame.style.display = 'block';
        renderTabs();
    }

    // --- helpers ---
    function showError() { errorOverlay.style.display = 'flex'; }
    function hideError() { errorOverlay.style.display = 'none'; }

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // --- event listeners: Enter key on both inputs ---
    [urlInput, mainSearch].forEach(inp => {
        inp.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                navigate(e.target.value);
            }
        });
    });

    // navigation controls
    function navBack() {
        try {
            const f = document.getElementById(`frame-${activeTabId}`);
            f.contentWindow.history.back();
        } catch (e) { /* cross-origin will often block this; ignore silently */ }
    }
    function navForward() {
        try {
            const f = document.getElementById(`frame-${activeTabId}`);
            f.contentWindow.history.forward();
        } catch (e) {}
    }
    function reloadTab() {
        const f = document.getElementById(`frame-${activeTabId}`);
        if (f) {
            // reload by reassigning src
            const old = f.src;
            f.src = '';
            f.src = old;
        }
    }

    // expose to global for buttons
    window.addTab = addTab;
    window.navigate = navigate;
    window.closeTab = closeTab;
    window.navBack = navBack;
    window.navForward = navForward;
    window.reloadTab = reloadTab;
    window.hideError = hideError;
    </script>
</body>
</html>
