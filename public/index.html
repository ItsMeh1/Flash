<!DOCTYPE html>
<html lang="en">
<head>
<script src="/scram/scramjet.all.js"></script>
<script src="/baremux/index.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Browser</title>

    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-bar: #16161a;
            --bg-nav: #24242b;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --text-dark: #64748b;
            --border-light: rgba(255, 255, 255, 0.05);
            --yellow: #facc15;
            --yellow-hover: #eab308;
        }

        body, html { 
            margin: 0; padding: 0; 
            height: 100vh; overflow: hidden; 
            display: flex; flex-direction: column; 
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            box-sizing: border-box;
        }
        *, *:before, *:after { box-sizing: inherit; }

        /* Tab Bar */
        .tab-bar {
            display: flex; align-items: center;
            background-color: var(--bg-bar);
            padding: 8px 8px 0; gap: 4px;
            border-bottom: 1px solid var(--border-light);
            user-select: none;
        }
        .tab-container {
            display: flex; flex: 1; overflow-x: auto; gap: 4px;
        }
        .tab-container::-webkit-scrollbar { display: none; }
        .add-tab-btn {
            padding: 8px; margin-bottom: 4px; border-radius: 50%;
            color: var(--text-dark); background: transparent; border: none;
            cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .add-tab-btn svg { width: 16px; height: 16px; }
        .add-tab-btn:hover { background-color: rgba(255,255,255,0.05); }

        /* Tabs */
        .tab {
            display: flex; align-items: center; min-width: 140px; max-width: 200px; height: 40px; 
            padding: 0 12px; cursor: pointer; border-radius: 12px 12px 0 0; 
            font-size: 12px; font-weight: 600; transition: all 0.2s;
            user-select: none; color: var(--text-muted);
        }
        .tab:hover { background-color: rgba(255,255,255,0.05); }
        .tab.active { background-color: var(--bg-nav); color: white; position: relative; }
        .tab.active::after { 
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; 
            background: var(--yellow-hover); box-shadow: 0 -2px 10px rgba(234, 179, 8, 0.5); 
        }
        .tab-icon-wrapper { width: 16px; height: 16px; margin-right: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .tab-favicon { width: 16px; height: 16px; border-radius: 2px; }
        .tab-icon { width: 14px; height: 14px; }
        .tab-icon.active { color: var(--yellow); }
        .tab-icon.inactive { color: var(--text-dark); }
        
        .tab-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .tab-close {
            margin-left: 8px; padding: 4px; border-radius: 50%; opacity: 0;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .tab:hover .tab-close { opacity: 1; }
        .tab-close:hover { background-color: rgba(255,255,255,0.1); }
        .tab-close svg { width: 12px; height: 12px; }

        /* Nav Bar */
        .nav-bar {
            display: flex; align-items: center; gap: 12px;
            background-color: var(--bg-nav); padding: 10px 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); z-index: 20; position: relative;
        }
        .nav-btns { display: flex; align-items: center; gap: 4px; }
        .nav-btn {
            padding: 8px; border-radius: 8px; color: var(--text-muted);
            background: transparent; border: none; cursor: pointer;
            transition: background-color 0.2s; display: flex; align-items: center; justify-content: center; text-decoration: none;
        }
        .nav-btn:hover { background-color: rgba(255,255,255,0.05); }
        .nav-btn svg { width: 20px; height: 20px; }

        /* URL Input */
        .url-container { flex: 1; position: relative; display: flex; align-items: center; }
        .url-icon { position: absolute; left: 16px; color: var(--text-dark); width: 16px; height: 16px; transition: color 0.2s; }
        .url-container:focus-within .url-icon { color: var(--yellow); }
        .url-input {
            width: 100%; background-color: var(--bg-bar);
            border: 1px solid var(--border-light); border-radius: 12px;
            padding: 10px 144px 10px 44px; font-size: 14px; color: white;
            transition: all 0.2s; font-weight: 500; font-family: inherit;
        }
        .url-input:focus { outline: none; box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.3); border-color: transparent; }

        /* Proxy Settings */
        .proxy-controls { position: absolute; right: 8px; display: flex; align-items: center; gap: 8px; }
        .proxy-badge { 
            font-size: 9px; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 0.1em; padding: 3px 8px; border-radius: 6px; 
            font-family: monospace; border: 1px solid transparent; 
        }
        .badge-scramjet { color: #4ade80; background-color: rgba(74, 222, 128, 0.1); border-color: rgba(74, 222, 128, 0.2); }

        /* Main Content Area */
        main { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; background-color: var(--bg-main); }
        iframe { border: none; width: 100%; height: 100%; display: none; background: white; }
        .frames-container { width: 100%; height: 100%; position: relative; z-index: 0; }

        /* Home Screen */
        #homeScreen {
            position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background-color: var(--bg-main);
        }
        .logo-container { margin-bottom: 40px; text-align: center; position: relative; }
        .flash-logo { 
            font-size: 5.5rem; font-weight: 900; font-style: italic; 
            letter-spacing: -0.05em; color: white; margin: 0;
        }
        .flash-logo span { color: var(--yellow); filter: drop-shadow(0 0 15px rgba(250, 204, 21, 0.6)); }

        .search-wrapper { width: 100%; max-width: 42rem; padding: 0 24px; position: relative; z-index: 20; }
        .search-icon { position: absolute; left: 44px; top: 50%; transform: translateY(-50%); color: var(--text-dark); width: 20px; height: 20px; }
        .main-search {
            width: 100%; background-color: var(--bg-bar); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 20px 24px 20px 64px; font-size: 20px; color: white;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); font-family: inherit;
        }

        .quick-links { display: flex; gap: 32px; margin-top: 64px; z-index: 20; }
        .quick-link { display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; }
        .ql-icon {
            width: 64px; height: 64px; background-color: var(--bg-bar); border: 1px solid var(--border-light);
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: 900; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
        }
        .ql-label { font-size: 10px; text-transform: uppercase; font-weight: 700; color: #475569; letter-spacing: 0.1em; }
        .footer-info { position: absolute; bottom: 40px; display: flex; gap: 24px; font-size: 10px; font-weight: 700; color: #334155; text-transform: uppercase; letter-spacing: 0.3em; }
    </style>
</head>

<body>

<div class="tab-bar">
    <div id="tabContainer" class="tab-container"></div>
    <button onclick="addTab()" class="add-tab-btn">
        <i data-lucide="plus"></i>
    </button>
</div>

<div class="nav-bar">
    <div class="nav-btns">
        <button onclick="navBack()" class="nav-btn"><i data-lucide="arrow-left"></i></button>
        <button onclick="navForward()" class="nav-btn"><i data-lucide="arrow-right"></i></button>
        <button onclick="reloadTab()" class="nav-btn"><i data-lucide="rotate-cw"></i></button>
        <button onclick="goHome()" class="nav-btn"><i data-lucide="home"></i></button>
    </div>

    <div class="url-container">
        <i data-lucide="shield-check" class="url-icon"></i>
        <input type="text" id="urlInput" placeholder="Search or enter address..." class="url-input"/>
        <div class="proxy-controls">
            <span class="proxy-badge badge-scramjet">SCRAMJET</span>
        </div>
    </div>
</div>

<main>
    <div id="homeScreen">
        <div class="logo-container">
            <h1 class="flash-logo">FLASH<span>⚡</span></h1>
        </div>
        <div class="search-wrapper">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="mainSearch" placeholder="What are we doing today?" class="main-search"/>
        </div>
        <div class="quick-links">
            <div onclick="navigate('google.com')" class="quick-link">
                <div class="ql-icon" style="color:#60a5fa">G</div>
                <span class="ql-label">Google</span>
            </div>
            <div onclick="navigate('youtube.com')" class="quick-link">
                <div class="ql-icon" style="color:#ef4444">Y</div>
                <span class="ql-label">YouTube</span>
            </div>
            <div onclick="navigate('discord.com')" class="quick-link">
                <div class="ql-icon" style="color:#818cf8">D</div>
                <span class="ql-label">Discord</span>
            </div>
        </div>
        <div class="footer-info">
            <span>SCRAMJET ENGINE</span>
            <span>•</span>
            <span>Safe Browsing On</span>
        </div>
    </div>
    <div id="framesContainer" class="frames-container"></div>
</main>

<script>
let tabs = [];
let activeTabId = null;
let proxyReady = false;

window.addEventListener("load", async () => {

    if ("serviceWorker" in navigator) {
        await navigator.serviceWorker.register("/sw.js");
    }

    try {
       const baremux = new self.BareMuxConnection("/baremux/worker.js");
       await baremux.setTransport("/epoxy/index.mjs");
        console.log("BareMux ready");

        proxyReady = true;

    } catch (err) {
        console.error("BareMux failed:", err);
    }

});

function addTab() {
    const id = Date.now();
    const tab = { id, title: "New Tab", url: "", favicon: null };
    tabs.push(tab);

    const frame = document.createElement("iframe");
    frame.id = `frame-${id}`;
    document.getElementById("framesContainer").appendChild(frame);

    switchTab(id);
}

function switchTab(id) {
    activeTabId = id;
    const tab = tabs.find(t => t.id === id);
    const homeScreen = document.getElementById("homeScreen");
    const urlInput = document.getElementById("urlInput");

    document.querySelectorAll("iframe").forEach(f => f.style.display = "none");
    const activeFrame = document.getElementById(`frame-${id}`);

    if (tab.url) {
        activeFrame.style.display = "block";
        homeScreen.style.display = "none";
        urlInput.value = tab.url;
    } else {
        activeFrame.style.display = "none";
        homeScreen.style.display = "flex";
        urlInput.value = "";
    }

    renderTabs();
}

function renderTabs() {
    const container = document.getElementById("tabContainer");
    container.innerHTML = "";

    tabs.forEach(tab => {

        const isActive = tab.id === activeTabId;
        const div = document.createElement("div");

        div.className = `tab ${isActive ? "active" : ""}`;
        div.onclick = () => switchTab(tab.id);

        let iconContent = "";

        if (tab.favicon) {
            iconContent = `<img src="${tab.favicon}" class="tab-favicon" onerror="handleFaviconError(this, ${isActive})">`;
        } else {
            iconContent = `<i data-lucide="${isActive ? "zap" : "globe"}" class="tab-icon ${isActive ? "active" : "inactive"}"></i>`;
        }

        div.innerHTML = `
        <div class="tab-icon-wrapper">
            ${iconContent}
        </div>

        <span class="tab-title">${tab.title}</span>

        <span onclick="closeTab(event, ${tab.id})" class="tab-close">
            <i data-lucide="x"></i>
        </span>
        `;

        container.appendChild(div);
    });

    lucide.createIcons();
}

function handleFaviconError(img, isActive) {

    const wrapper = img.parentElement;

    wrapper.innerHTML =
    `<i data-lucide="${isActive ? "zap" : "globe"}"
    class="tab-icon ${isActive ? "active" : "inactive"}"></i>`;

    lucide.createIcons();
}

function closeTab(e, id) {

    e.stopPropagation();

    if (tabs.length === 1) return;

    const idx = tabs.findIndex(t => t.id === id);

    tabs = tabs.filter(t => t.id !== id);

    document.getElementById(`frame-${id}`).remove();

    if (activeTabId === id) {
        switchTab(tabs[idx] ? tabs[idx].id : tabs[tabs.length - 1].id);
    } else {
        renderTabs();
    }
}

function navigate(val) {

    if (!proxyReady) {
        console.warn("Proxy not ready yet");
        return;
    }

    if (!val) return;

    let url = val.trim();

    if (!url.includes(".") || url.includes(" ")) {
        url = "https://www.google.com/search?q=" + encodeURIComponent(url);
    }
    else if (!url.startsWith("http://") && !url.startsWith("https://")) {
        url = "https://" + url;
    }

    const frame = document.getElementById(`frame-${activeTabId}`);
    if (!frame) return;

    const proxied = "/scramjet/" + encodeURIComponent(url);

    frame.src = proxied;

    const tab = tabs.find(t => t.id === activeTabId);

    tab.url = url;

    try {

        const domain = new URL(url).hostname;

        tab.title = domain;

        tab.favicon =
        "https://www.google.com/s2/favicons?domain=" + domain + "&sz=64";

    } catch {

        tab.title = url;

    }

    switchTab(activeTabId);
}

function goHome() {

    const tab = tabs.find(t => t.id === activeTabId);

    tab.url = "";
    tab.title = "New Tab";
    tab.favicon = null;

    switchTab(activeTabId);
}

[document.getElementById("urlInput"), document.getElementById("mainSearch")]

.forEach(el => {

    el.addEventListener("keydown", e => {

        if (e.key === "Enter") navigate(e.target.value);

    });

});

function navBack() {

    try {

        document.getElementById(`frame-${activeTabId}`).contentWindow.history.back();

    } catch {}

}

function navForward() {

    try {

        document.getElementById(`frame-${activeTabId}`).contentWindow.history.forward();

    } catch {}

}

function reloadTab() {

    const f = document.getElementById(`frame-${activeTabId}`);

    f.src = f.src;

}

lucide.createIcons();
</script>
</body>
</html>
