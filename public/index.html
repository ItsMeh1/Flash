```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eagler Launcher</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
}

#topbar{
display:flex;
gap:10px;
padding:10px;
background:#1a1a1a;
}

#urlInput{
flex:1;
padding:8px;
border:none;
border-radius:6px;
font-size:14px;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
cursor:pointer;
}

button:hover{
background:#45a049;
}

select{
padding:8px;
border-radius:6px;
border:none;
}

#browserFrame{
width:100%;
height:calc(100vh - 50px);
border:none;
background:white;
}

</style>
</head>

<body>

<div id="topbar">

<input id="urlInput" placeholder="Search or enter URL">

<button onclick="navigate()">Go</button>

<select id="engineSelect" onchange="setEngine(this.value)">
<option value="bing">Bing</option>
<option value="scramjet">Scramjet</option>
</select>

</div>

<iframe id="browserFrame"></iframe>

<script>

function setEngine(engine){
localStorage.setItem("engine", engine);
}

window.onload = () => {
const saved = localStorage.getItem("engine") || "bing";
document.getElementById("engineSelect").value = saved;
};

async function navigate(){

const input = document.getElementById("urlInput");
const frame = document.getElementById("browserFrame");

let query = input.value.trim();

if(!query) return;

const engine = localStorage.getItem("engine") || "bing";

const isURL =
query.startsWith("http://") ||
query.startsWith("https://") ||
query.includes(".");

if(isURL && !query.startsWith("http")){
query = "https://" + query;
}

try{

if(engine === "scramjet"){

const encoded = await $scramjet.encodeUrl(query);
frame.src = "/scramjet/" + encoded;

}else{

if(isURL){
frame.src = query;
}else{
frame.src = "https://www.bing.com/search?q=" + encodeURIComponent(query);
}

}

}catch(err){

console.error("Navigation error:", err);

frame.src =
"https://www.bing.com/search?q=" +
encodeURIComponent(query);

}

}

</script>

</body>
</html>
